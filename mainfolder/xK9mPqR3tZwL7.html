<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard</title>
  <meta name="robots" content="noindex,nofollow"/>
  <style>
    :root {
      --bg: #0f1117; --card: #1a1d27; --border: #2a2d3e;
      --accent: #4f8ef7; --accent2: #7c3aed; --text: #e2e8f0;
      --muted: #64748b; --green: #22c55e; --red: #ef4444;
      --yellow: #f59e0b;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; min-height: 100vh; }

    /* ── Login Screen ── */
    #loginScreen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 20px;
    }
    .login-box {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 40px 36px; width: 100%; max-width: 380px;
      box-shadow: 0 25px 60px rgba(0,0,0,.5);
    }
    .login-box h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .login-box p  { color: var(--muted); font-size: 14px; margin-bottom: 28px; }
    .input-wrap { position: relative; margin-bottom: 16px; }
    .input-wrap input {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; padding: 13px 16px; color: var(--text);
      font-size: 15px; outline: none; transition: border-color .2s;
    }
    .input-wrap input:focus { border-color: var(--accent); }
    .login-btn {
      width: 100%; background: var(--accent); color: #fff;
      border: none; border-radius: 10px; padding: 14px;
      font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity .2s;
    }
    .login-btn:hover { opacity: .88; }
    .login-btn:disabled { opacity: .5; cursor: not-allowed; }
    .err-msg { color: var(--red); font-size: 13px; margin-top: 10px; min-height: 20px; text-align: center; }

    /* ── Dashboard ── */
    #dashboard { display: none; padding: 24px; max-width: 1400px; margin: 0 auto; }
    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 28px; flex-wrap: wrap; gap: 12px;
    }
    .top-bar h1 { font-size: 20px; font-weight: 700; }
    .top-actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn {
      padding: 9px 18px; border-radius: 8px; font-size: 13px; font-weight: 600;
      cursor: pointer; border: none; transition: opacity .2s;
    }
    .btn:hover { opacity: .82; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-danger  { background: var(--red); color: #fff; }
    .btn-primary { background: var(--accent); color: #fff; }

    /* Stats row */
    .stats { display: grid; grid-template-columns: repeat(auto-fit,minmax(160px,1fr)); gap: 14px; margin-bottom: 28px; }
    .stat-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 18px 20px;
    }
    .stat-card .label { font-size: 12px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .05em; }
    .stat-card .value { font-size: 28px; font-weight: 700; }

    /* Filters */
    .filters {
      display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 18px;
    }
    .filters input, .filters select {
      background: var(--card); border: 1px solid var(--border); color: var(--text);
      padding: 8px 13px; border-radius: 8px; font-size: 13px; outline: none;
    }
    .filters input:focus, .filters select:focus { border-color: var(--accent); }

    /* Table */
    .table-wrap {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
    }
    .table-wrap table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .table-wrap th {
      background: #13151f; color: var(--muted); font-weight: 600; text-align: left;
      padding: 12px 14px; font-size: 11px; text-transform: uppercase; letter-spacing: .06em;
      border-bottom: 1px solid var(--border); white-space: nowrap;
    }
    .table-wrap td {
      padding: 11px 14px; border-bottom: 1px solid #1e2130; vertical-align: top; word-break: break-word;
    }
    .table-wrap tr:last-child td { border-bottom: none; }
    .table-wrap tr:hover td { background: rgba(255,255,255,.02); }
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 999px;
      font-size: 11px; font-weight: 600;
    }
    .badge-mobile  { background: rgba(79,142,247,.15); color: var(--accent); }
    .badge-desktop { background: rgba(34,197,94,.12);  color: var(--green); }
    .badge-tablet  { background: rgba(245,158,11,.12); color: var(--yellow); }
    .empty-state {
      text-align: center; padding: 60px 20px; color: var(--muted);
    }
    .empty-state .icon { font-size: 36px; margin-bottom: 12px; }

    /* Pagination */
    .pagination {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; margin-top: 16px; flex-wrap: wrap;
    }
    .page-btn {
      background: var(--card); border: 1px solid var(--border); color: var(--text);
      padding: 6px 13px; border-radius: 7px; font-size: 13px; cursor: pointer;
    }
    .page-btn:hover { border-color: var(--accent); }
    .page-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .page-info { color: var(--muted); font-size: 13px; }

    @media (max-width: 640px) {
      #dashboard { padding: 14px; }
      .table-wrap { overflow-x: auto; }
      .table-wrap table { min-width: 700px; }
    }
  </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="login-box">
    <h1>🔒 Secure Dashboard</h1>
    <p>Enter your password to continue</p>
    <div class="input-wrap">
      <input type="password" id="pwdInput" placeholder="Password" autocomplete="off" spellcheck="false"/>
    </div>
    <button class="login-btn" id="loginBtn">Unlock Dashboard</button>
    <div class="err-msg" id="errMsg"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="top-bar">
    <h1>📊 Download Analytics</h1>
    <div class="top-actions">
      <button class="btn btn-outline" id="refreshBtn">↻ Refresh</button>
      <button class="btn btn-outline" id="exportBtn">⬇ Export CSV</button>
      <button class="btn btn-danger"  id="clearBtn">🗑 Clear All</button>
    </div>
  </div>

  <div class="stats" id="statsRow"></div>

  <div class="filters">
    <input type="text" id="searchInput" placeholder="🔍  Search IP, country, browser…" style="flex:1;min-width:200px;"/>
    <select id="deviceFilter"><option value="">All Devices</option><option>Desktop</option><option>Mobile</option><option>Tablet</option></select>
    <select id="countryFilter"><option value="">All Countries</option></select>
    <select id="sortSelect">
      <option value="newest">Newest First</option>
      <option value="oldest">Oldest First</option>
    </select>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Date & Time</th>
          <th>IP Address</th>
          <th>Country / City</th>
          <th>Browser</th>
          <th>OS</th>
          <th>Device</th>
          <th>ISP</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
  <div class="pagination" id="pagination"></div>
</div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let TOKEN   = '';
  let allLogs = [];
  let curPage = 1;
  const PER_PAGE = 25;

  // ── Login ──────────────────────────────────────────────────────────────────
  async function doLogin() {
    const pwd = document.getElementById('pwdInput').value;
    if (!pwd) return;
    const btn = document.getElementById('loginBtn');
    btn.disabled = true; btn.textContent = 'Checking…';

    try {
      const r = await fetch('/api/admin-login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pwd })
      });
      if (r.ok) {
        const d = await r.json();
        TOKEN = d.token;
        document.getElementById('loginScreen').style.display  = 'none';
        document.getElementById('dashboard').style.display    = 'block';
        loadLogs();
      } else {
        document.getElementById('errMsg').textContent = '❌ Wrong password. Try again.';
        btn.disabled = false; btn.textContent = 'Unlock Dashboard';
      }
    } catch {
      document.getElementById('errMsg').textContent = '⚠️ Server error.';
      btn.disabled = false; btn.textContent = 'Unlock Dashboard';
    }
  }

  document.getElementById('loginBtn').onclick = doLogin;
  document.getElementById('pwdInput').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  // ── Fetch logs ─────────────────────────────────────────────────────────────
  async function loadLogs() {
    try {
      const r = await fetch('/api/admin-logs', { headers: { 'x-admin-token': TOKEN } });
      if (!r.ok) { alert('Session expired. Please reload.'); return; }
      allLogs = await r.json();
      populateCountryFilter();
      curPage = 1;
      renderTable();
    } catch { alert('Failed to load logs.'); }
  }

  // ── Country filter options ─────────────────────────────────────────────────
  function populateCountryFilter() {
    const sel = document.getElementById('countryFilter');
    const countries = [...new Set(allLogs.map(l => l.country).filter(Boolean))].sort();
    sel.innerHTML = '<option value="">All Countries</option>';
    countries.forEach(c => { const o = document.createElement('option'); o.value = o.textContent = c; sel.appendChild(o); });
  }

  // ── Filter + sort ──────────────────────────────────────────────────────────
  function getFiltered() {
    const q       = document.getElementById('searchInput').value.toLowerCase();
    const device  = document.getElementById('deviceFilter').value;
    const country = document.getElementById('countryFilter').value;
    const sort    = document.getElementById('sortSelect').value;

    let data = allLogs.filter(l => {
      if (q && !`${l.ip} ${l.country} ${l.city} ${l.browser} ${l.os} ${l.isp}`.toLowerCase().includes(q)) return false;
      if (device  && l.device  !== device)  return false;
      if (country && l.country !== country) return false;
      return true;
    });

    data = sort === 'oldest' ? data : [...data].reverse();
    return data;
  }

  // ── Render ─────────────────────────────────────────────────────────────────
  function renderTable() {
    const filtered = getFiltered();
    const total    = filtered.length;

    // Stats
    const countries = new Set(allLogs.map(l => l.country));
    const mobiles   = allLogs.filter(l => l.device === 'Mobile').length;
    document.getElementById('statsRow').innerHTML = `
      <div class="stat-card"><div class="label">Total Downloads</div><div class="value">${allLogs.length}</div></div>
      <div class="stat-card"><div class="label">Filtered Results</div><div class="value">${total}</div></div>
      <div class="stat-card"><div class="label">Countries</div><div class="value">${countries.size}</div></div>
      <div class="stat-card"><div class="label">Mobile Users</div><div class="value">${mobiles}</div></div>
    `;

    // Pagination
    const totalPages = Math.max(1, Math.ceil(total / PER_PAGE));
    if (curPage > totalPages) curPage = totalPages;
    const start  = (curPage - 1) * PER_PAGE;
    const sliced = filtered.slice(start, start + PER_PAGE);

    // Rows
    const tbody = document.getElementById('tableBody');
    if (!sliced.length) {
      tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><div class="icon">📭</div><div>No downloads yet</div></div></td></tr>`;
    } else {
      tbody.innerHTML = sliced.map((l, i) => {
        const dt  = l.timestamp ? new Date(l.timestamp).toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' }) : '—';
        const loc = [l.city, l.country].filter(Boolean).join(', ') || '—';
        const dc  = l.device === 'Mobile' ? 'badge-mobile' : l.device === 'Tablet' ? 'badge-tablet' : 'badge-desktop';
        return `<tr>
          <td style="color:var(--muted)">${start + i + 1}</td>
          <td style="white-space:nowrap">${dt}</td>
          <td style="font-family:monospace;font-size:12px">${l.ip || '—'}</td>
          <td>${loc}</td>
          <td>${l.browser || '—'}</td>
          <td>${l.os || '—'}</td>
          <td><span class="badge ${dc}">${l.device || '—'}</span></td>
          <td style="color:var(--muted);font-size:12px">${l.isp || '—'}</td>
        </tr>`;
      }).join('');
    }

    // Page buttons
    const pg = document.getElementById('pagination');
    if (totalPages <= 1) { pg.innerHTML = ''; return; }
    let html = '';
    html += `<button class="page-btn" onclick="goPage(${curPage-1})" ${curPage===1?'disabled':''}>‹</button>`;
    for (let p = 1; p <= totalPages; p++) {
      if (totalPages > 10 && Math.abs(p - curPage) > 2 && p !== 1 && p !== totalPages) {
        if (p === 2 || p === totalPages - 1) html += `<span class="page-info">…</span>`;
        continue;
      }
      html += `<button class="page-btn ${p===curPage?'active':''}" onclick="goPage(${p})">${p}</button>`;
    }
    html += `<button class="page-btn" onclick="goPage(${curPage+1})" ${curPage===totalPages?'disabled':''}>›</button>`;
    html += `<span class="page-info">${start+1}–${Math.min(start+PER_PAGE,total)} of ${total}</span>`;
    pg.innerHTML = html;
  }

  function goPage(p) { curPage = p; renderTable(); window.scrollTo(0,0); }

  // ── Filter events ──────────────────────────────────────────────────────────
  ['searchInput','deviceFilter','countryFilter','sortSelect'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => { curPage = 1; renderTable(); });
  });

  // ── Action buttons ─────────────────────────────────────────────────────────
  document.getElementById('refreshBtn').onclick = loadLogs;

  document.getElementById('clearBtn').onclick = async () => {
    if (!confirm('Delete ALL download logs permanently?')) return;
    await fetch('/api/admin-logs', { method: 'DELETE', headers: { 'x-admin-token': TOKEN } });
    allLogs = [];
    renderTable();
  };

  document.getElementById('exportBtn').onclick = () => {
    const filtered = getFiltered();
    const header = ['#','Timestamp','IP','Country','Region','City','ISP','Browser','OS','Device','Referer'];
    const rows   = filtered.map((l,i) => [
      i+1, l.timestamp, l.ip, l.country, l.region, l.city, l.isp, l.browser, l.os, l.device, l.referer
    ].map(v => `"${(v||'').toString().replace(/"/g,'""')}"`).join(','));
    const csv  = [header.join(','), ...rows].join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const a    = document.createElement('a');
    a.href     = URL.createObjectURL(blob);
    a.download = `downloads-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
  };
</script>
</body>
</html>
